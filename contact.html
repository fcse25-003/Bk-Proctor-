<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - BK Proctor</title>

    <!-- Main CSS -->
    <link rel="stylesheet" href="css/style.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="logo">
            <a href="index.html">BK Proctor</a>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="shop.html">Shop</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
        <div class="hamburger">
            <i class="fas fa-bars"></i>
        </div>
    </nav>

    <!-- Contact Section -->
    <section class="featured">
        <h2>Get In Touch</h2>
        <p style="max-width: 700px; margin: 0 auto 3rem; line-height: 1.7; font-size: 1.05rem; text-align: center;">
            Have questions about our products, want to place an order, or would like to share feedback? 
            We're here to help.
        </p>

        <div class="contact-container">
            <form class="contact-form" id="contact-form">

                <!-- Name -->
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="Enter your full name" required>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>

                <!-- Subject -->
                <div class="form-group">
                    <label for="subject">Subject</label>
                    <select id="subject" required>
                        <option value="">Choose Subject</option>
                        <option value="Order Inquiry">Order Inquiry</option>
                        <option value="Product Information">Product Information</option>
                        <option value="Feedback">Share Feedback</option>
                        <option value="Partnership">Partnership / Collaboration</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <!-- Message -->
                <div class="form-group">
                    <label for="message">Your Message</label>
                    <textarea id="message" rows="8" placeholder="Write your message here (orders, questions, or feedback)..." required></textarea>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="submit-btn">
                    <i class="fas fa-paper-plane"></i>
                    Send Message
                </button>
            </form>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Collections by BK Proctor. All Rights Reserved.</p>
        <div class="social">
            <a href="https://www.instagram.com/bk.proctor/"><i class="fab fa-instagram"></i></a>
            <a href="https://www.tiktok.com/@collectionsbybkproctor"><i class="fab fa-tiktok"></i></a>
            <a href="https://www.facebook.com/collectionsbybkproctor/"><i class="fab fa-facebook"></i></a>
        </div>
    </footer>
    <script src="script.js"></script>
</body>
</html>
